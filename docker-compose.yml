x-llama-common: &llama-common
  # JetPack 7.2 (L4T 39.2 / CUDA 13.2.1 / Ubuntu 24.04) 专用构建
  # 使用本地 Dockerfile 基于 NVIDIA NGC cuda:13.2.1-runtime-ubuntu24.04
  # llama-server 二进制及共享库通过 volume 挂载从宿主机 /usr/local 注入容器
  build:
    context: .
    dockerfile: Dockerfile
  runtime: nvidia
  network_mode: host
  restart: unless-stopped
  volumes:
    - /mnt/ssd/huggingface:/root/.cache/huggingface
    # 将宿主机编译安装的 llama-server 二进制和共享库注入容器
    # 宿主机更新 llama.cpp 后执行: sudo cmake --install ... --prefix /usr/local
    # 然后只需: docker compose restart  (无需 docker compose build)
    - /usr/local/bin:/usr/local/bin:ro
    - /usr/local/lib:/usr/local/lib:ro
  environment:
    - HF_ENDPOINT=https://hf-mirror.com
    # Jetson UMA 统一内存优化: 允许运行时统一调度 CPU/GPU 内存，
    # 社区实测可带来约 10~15% 的推理性能提升
    - GGML_CUDA_ENABLE_UNIFIED_MEMORY=1
  ulimits:
    memlock:
      soft: -1
      hard: -1

services:
  gemma4-31b:
    <<: *llama-common
    container_name: gemma4-31b
    command: >
      llama-server
      -m /root/.cache/huggingface/gemma-4-31B-it-qat-UD-Q4_K_XL.gguf
      --host 0.0.0.0
      --port 8080
      -ngl 999
      -c 65536
      --flash-attn on
      --cache-type-k q8_0
      --cache-type-v q4_0
      -t 8
      --batch-size 512
      --ubatch-size 256
      --mlock
      --jinja
      --cache-ram 8192
      --swa-checkpoints 4

  gemma4-26b-a4b:
    <<: *llama-common
    container_name: gemma4-26b-a4b
    command: >
      llama-server
      -m /root/.cache/huggingface/gemma-4-26B-A4B-it-qat-UD-Q4_K_XL.gguf
      --host 0.0.0.0
      --port 8081
      -ngl 999
      -c 65536
      --flash-attn on
      --cache-type-k q8_0
      --cache-type-v q4_0
      -t 8
