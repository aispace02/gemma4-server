x-llama-common: &llama-common
  image: ghcr.io/nvidia-ai-iot/llama_cpp:latest-jetson-orin
  runtime: nvidia
  network_mode: host
  restart: unless-stopped
  volumes:
    - /mnt/ssd/huggingface:/root/.cache/huggingface
  environment:
    - HF_ENDPOINT=https://hf-mirror.com

services:
  gemma4-31b:
    <<: *llama-common
    container_name: gemma4-31b
    command: >
      llama-server
      -m /root/.cache/huggingface/gemma-4-31B-it-qat-UD-Q4_K_XL.gguf
      --host 0.0.0.0
      --port 8080
      -ngl 999
      -c 65536
      --flash-attn on
      --cache-type-k q8_0
      --cache-type-v q4_0
      -t 8
      --batch-size 512
      --ubatch-size 256
      --mlock
      --jinja
      --cache-ram 0
      --swa-checkpoints 4

  gemma4-26b-a4b:
    <<: *llama-common
    container_name: gemma4-26b-a4b
    command: >
      llama-server
      -m /root/.cache/huggingface/gemma-4-26B-A4B-it-qat-UD-Q4_K_XL.gguf
      --host 0.0.0.0
      --port 8081
      -ngl 999
      -c 65536
      --flash-attn on
      --cache-type-k q8_0
      --cache-type-v q4_0
      -t 8
      --batch-size 512
      --ubatch-size 256
      --mlock
      --jinja
      --cache-ram 0
      --swa-checkpoints 4