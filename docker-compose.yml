x-llama-common: &llama-common
  # JetPack 7.2 (L4T 39.2 / CUDA 13.2.1 / Ubuntu 24.04) 专用构建
  # 使用本地 Dockerfile 基于 NVIDIA NGC cuda:13.2.1-runtime-ubuntu24.04
  # llama-server 二进制及共享库通过 volume 挂载从宿主机 /usr/local 注入容器
  #
  # 注意: 挂载目标路径使用 /opt/llama 而不是 /usr/local 的原因:
  #   NVIDIA CDI hook (nvidia-cdi-hook cudacompat) 在容器初始化时会扫描标准库
  #   路径（/usr/local/lib 等）寻找 CUDA 库做前向兼容性检测，解析
  #   libggml-cuda.so 的 ELF 头时会触发 toolkit 自身的 bug（panic: slice
  #   bounds out of range）。挂载到 /opt/llama 非标准路径可避开扫描。
  build:
    context: .
    dockerfile: Dockerfile
  runtime: nvidia
  devices:
    - nvidia.com/gpu=all
  network_mode: host
  restart: unless-stopped
  volumes:
    - /mnt/ssd/huggingface:/root/.cache/huggingface
    # 将宿主机编译安装的 llama-server 二进制和共享库挂载到非标准路径
    # 避开 NVIDIA CDI hook 对 /usr/local/lib 的 CUDA ELF 扫描 (panic bug)
    # 宿主机更新 llama.cpp 并重新安装后，只需: docker compose restart
    - /usr/local/bin:/opt/llama/bin:ro
    - /usr/local/lib:/opt/llama/lib:ro
  environment:
    - HF_ENDPOINT=https://hf-mirror.com
    # 显式启用 GPU 设备及其所有能力
    - NVIDIA_VISIBLE_DEVICES=all
    - NVIDIA_DRIVER_CAPABILITIES=all
    # Jetson UMA 统一内存优化: 允许运行时统一调度 CPU/GPU 内存，
    # 社区实测可带来约 10~15% 的推理性能提升
    - GGML_CUDA_ENABLE_UNIFIED_MEMORY=1
    # 让容器能找到挂载到 /opt/llama 的二进制 and 共享库
    - PATH=/opt/llama/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    # 由于禁用了 update-ldcache 挂钩，必须手动将 NVIDIA 驱动相关路径加入链接器搜索路径
    # 宿主机使用 nvgpu 驱动，因此仅保留 nvgpu 排除 openrm 避免驱动冲突
    - LD_LIBRARY_PATH=/opt/llama/lib:/usr/lib/aarch64-linux-gnu/nvidia:/opt/nvidia/l4t-gpu-libs/nvgpu
  ulimits:
    memlock:
      soft: -1
      hard: -1

services:
  gemma4-31b:
    <<: *llama-common
    container_name: gemma4-31b
    command: >
      llama-server
      -m /root/.cache/huggingface/gemma-4-31B-it-qat-UD-Q4_K_XL.gguf
      --host 0.0.0.0
      --port 8080
      -ngl 999
      -c 65536
      --flash-attn on
      --cache-type-k q8_0
      --cache-type-v q4_0
      -t 8
      --batch-size 512
      --ubatch-size 256
      --mlock
      --jinja
      --cache-ram 8192
      --swa-checkpoints 4
      --n-predict 8192
      --repeat-penalty 1.1

  gemma4-26b-a4b:
    <<: *llama-common
    container_name: gemma4-26b-a4b
    command: >
      llama-server
      -m /root/.cache/huggingface/gemma-4-26B-A4B-it-qat-UD-Q4_K_XL.gguf
      --host 0.0.0.0
      --port 8081
      -ngl 999
      -c 65536
      --flash-attn on
      --cache-type-k q8_0
      --cache-type-v q4_0
      -t 8
      --batch-size 512
      --ubatch-size 256
      --mlock
      --jinja
      --cache-ram 8192
      --swa-checkpoints 4
      --n-predict 8192
      --repeat-penalty 1.1

  gemma4-12b-agentic:
    <<: *llama-common
    container_name: gemma4-12b-agentic
    command: >
      llama-server
      -m /root/.cache/huggingface/gemma4-v2-Q6_K.gguf
      --host 0.0.0.0
      --port 8082
      -ngl 999
      -c 65536
      --flash-attn on
      --cache-type-k q8_0
      --cache-type-v q4_0
      -t 8
      --batch-size 512
      --ubatch-size 256
      --mlock
      --jinja
      --cache-ram 8192
      --swa-checkpoints 4
      --n-predict 8192
      --repeat-penalty 1.1

  qwen36-35b-moe:
    <<: *llama-common
    container_name: qwen36-35b-moe
    # 官方原版 Qwen3.6-35B-A3B (Unsloth UD-Q4_K_M GGUF)。
    # 相比社区蒸馏版 (Qwopus3.6-...) 更稳定，为 Qwen 官方 post-train 产物，
    # 同样具备 agentic coding + thinking preservation 能力，原生 262K 上下文。
    # 架构 qwen3_5_moe (Gated DeltaNet + Gated Attention + 256 experts)，
    # 已被当前 llama.cpp (含 LLM_ARCH_QWEN35MOE) 支持。
    command: >
      llama-server
      -m /root/.cache/huggingface/Qwen3.6-35B-A3B-UD-Q4_K_M.gguf
      --host 0.0.0.0
      --port 8084
      -ngl 999
      -c 131072
      --flash-attn on
      --cache-type-k q8_0
      --cache-type-v q4_0
      -t 8
      --batch-size 512
      --ubatch-size 256
      --mlock
      --jinja
      --cache-ram 8192
      --swa-checkpoints 4
      --n-predict 8192
      --repeat-penalty 1.1
      --reasoning-preserve

  qwen36-27b:
    <<: *llama-common
    container_name: qwen36-27b
    # Qwen 官方原版 Qwen3.6-27B (Unsloth Q4_K_M GGUF) - 全参数 dense 模型。
    # 与 35B-A3B (MoE,仅激活 3B) 互补：27B 为全参数激活，每 token 计算量更大、
    # 但对单点推理质量（尤其非 agentic 的通用任务）更扎实稳定。
    # 架构 qwen3_5 (Gated DeltaNet + Gated Attention 混合层, 64 层 dense)，
    # 已被当前 llama.cpp (含 LLM_ARCH_QWEN35) 支持。原生 262K 上下文。
    command: >
      llama-server
      -m /root/.cache/huggingface/Qwen3.6-27B-Q4_K_M.gguf
      --host 0.0.0.0
      --port 8085
      -ngl 999
      -c 131072
      --flash-attn on
      --cache-type-k q8_0
      --cache-type-v q4_0
      -t 8
      --batch-size 512
      --ubatch-size 256
      --mlock
      --jinja
      --cache-ram 8192
      --swa-checkpoints 4
      --n-predict 8192
      --repeat-penalty 1.1
      --reasoning-preserve
