    container_name: gemma4-12b-agentic
    command: >
      llama-server
      -m /root/.cache/huggingface/gemma4-v2-Q6_K.gguf
      --host 0.0.0.0
      --port 8082
      -ngl 999
      -c 65536
      --flash-attn on
      --cache-type-k q8_0
      --cache-type-v q4_0
      -t 8
      --batch-size 512
      --ubatch-size 256
      --mlock
